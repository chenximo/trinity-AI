<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="登录 Trinity AI 账号。" />
    <title>登录 | Trinity AI</title>
    <script>
      (function () {
        var target = "../index.html#login";
        try {
          var q = new URLSearchParams(window.location.search);
          if (q.get("register") === "1" || q.get("signup") === "1") target = "../index.html#register";
        } catch (e) {}
        window.location.replace(target);
      })();
    </script>
    <meta http-equiv="refresh" content="0;url=../index.html#login" />
  </head>
  <body>
    <p>正在前往首页登录… <a href="../index.html#login">若未自动跳转请点此</a></p>
  </body>
</html>
