    <div class="adm-body">
      <main class="adm-main" id="main">
        <header class="adm-pagehead adm-pagehead--keys">
          <div class="adm-pagehead-row">
            <h1 class="adm-page-title">API 密钥管理</h1>
            <div class="adm-keys-expiry-filter" role="toolbar" aria-label="按到期状态筛选">
              <div class="or-app-filter-dd-wrap" id="adm-keys-expiry-dd-wrap">
                <button
                  type="button"
                  class="or-select or-select--app or-app-filter-dd-trigger"
                  id="adm-keys-expiry-dd-btn"
                  aria-expanded="false"
                  aria-haspopup="listbox"
                  aria-controls="adm-keys-expiry-dd-panel"
                >
                  <span id="adm-keys-expiry-dd-label" data-dd-label>全部</span>
                  <svg class="or-app-filter-dd-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                    <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </button>
                <div
                  class="or-app-filter-more-panel or-app-filter-pop-beak"
                  id="adm-keys-expiry-dd-panel"
                  role="listbox"
                  hidden
                  aria-label="到期筛选"
                  style="--or-pop-beak-x: 1.35rem"
                >
                  <button type="button" class="or-app-filter-dd-item is-checked" role="option" data-dd-value="全部" tabindex="-1">
                    <span class="or-app-filter-dd-label">全部</span>
                    <span class="or-app-filter-dd-mark" aria-hidden="true">✓</span>
                  </button>
                  <button type="button" class="or-app-filter-dd-item" role="option" data-dd-value="过期" tabindex="-1">
                    <span class="or-app-filter-dd-label">过期</span>
                    <span class="or-app-filter-dd-mark" aria-hidden="true"></span>
                  </button>
                  <button type="button" class="or-app-filter-dd-item" role="option" data-dd-value="不过期" tabindex="-1">
                    <span class="or-app-filter-dd-label">不过期</span>
                    <span class="or-app-filter-dd-mark" aria-hidden="true"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <p class="adm-lead">平台级或租户级密钥：吊销、轮换、绑定模型范围与 IP 白名单（原型仅列表）。</p>
        </header>

        <div class="adm-filter-row or-app-filter-row" style="margin-bottom: 1rem" aria-label="列表示意筛选">
          <div class="adm-filter-inline">
            <span class="adm-filter-label">租户</span>
            <div class="or-app-filter-dd-wrap" id="adm-keys-tenant-dd-wrap">
              <button
                type="button"
                class="or-select or-select--app or-app-filter-dd-trigger"
                id="adm-keys-tenant-dd-btn"
                aria-expanded="false"
                aria-haspopup="listbox"
                aria-controls="adm-keys-tenant-dd-panel"
              >
                <span id="adm-keys-tenant-dd-label" data-dd-label>全部租户</span>
                <svg class="or-app-filter-dd-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">

                </svg>
              </button>
              <div
                class="or-app-filter-more-panel or-app-filter-pop-beak"
                id="adm-keys-tenant-dd-panel"
                role="listbox"
                hidden
                aria-label="租户"
                style="--or-pop-beak-x: 2.75rem"

                  <span class="or-app-filter-dd-mark" aria-hidden="true">✓</span>

                <button type="button" class="or-app-filter-dd-item" role="option" data-dd-value="租户 A（演示）" tabindex="-1">

                  <span class="or-app-filter-dd-mark" aria-hidden="true"></span>
                </button>
                <button type="button" class="or-app-filter-dd-item" role="option" data-dd-value="租户 B（演示）" tabindex="-1">

                  <span class="or-app-filter-dd-mark" aria-hidden="true"></span>
                </button>
              </div>
            </div>
          </div>
          <div class="adm-filter-inline">
            <span class="adm-filter-label">状态</span>
            <div class="or-app-filter-dd-wrap" id="adm-keys-status-dd-wrap">

                <button type="button" class="or-app-filter-dd-item" role="option" data-dd-value="有效" tabindex="-1">

                  <span class="or-app-filter-dd-mark" aria-hidden="true"></span>
                </button>
              </div>
            </div>

                <tr>

                  <td>仅嵌入模型</td>
                  <td><span class="adm-badge warn">将过期</span></td>
                </tr>
              </tbody>
