<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trinity monorepo：单端口开发枢纽，聚合各 apps 路由预览。" />
    <title>Trinity · 开发枢纽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var _t = localStorage.getItem("trinity_or_theme");
        if (_t === "light" || _t === "dark") document.documentElement.setAttribute("data-theme", _t);
        else document.documentElement.setAttribute("data-theme", "system");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
