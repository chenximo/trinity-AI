    <template id="orc-help-tpl-composer" data-orc-prototype-annotation>
      <p>
        <strong>输入框</strong>：空内容时约<strong>两行</strong>高，随文字增高，最高约<strong>五行</strong>（超出在框内纵向滚动）；高度由 <code>syncOrcComposerTextareaHeight</code> 与 CSS 上下限共同约束。<strong>Enter</strong> 发送、<strong>Shift+Enter</strong> 换行。读屏用隐藏 <code>label</code>（<code>#orc-msg-access-label</code>）与占位符；主界面<strong>不</strong>在输入区上方叠常驻灰字说明条。
      </p>
      <p>
        <strong>版式</strong>：输入区与下方图标行之间<strong>无横向分隔线</strong>；图标行背景与输入区同色（不另铺灰底块），整体仍包在圆角外框内。
      </p>
      <p>
        <strong>回形针</strong>为附件占位；<strong>气泡 + 数字</strong>为对话记忆（滑块弹层）；<strong>地球 + 角标</strong>打开「SERVER TOOLS」式服务工具列表（演示）；<strong>模型对比</strong>在侧栏模型列表搜索旁，与弹层内「进入多模型对比…」等用于集合与多选；亦可从首页场景卡进入多模型对比。
      </p>
      <p>
        发送后助手消息下 <strong>Compare to</strong> 打开与侧栏<strong>模型对比</strong>相同的弹窗，多选后点<strong>完成</strong>写入侧栏「消息内对比」。
      </p>
      <p><strong>蓝钮发送</strong>后展示对比与<strong>综合总结（暂不支持）</strong>：下方区块为静态示意演示数据，正式版聚合与裁判逻辑未接。<strong>角色管理</strong>在上方顶栏；右下角 <strong>ⓘ</strong> 即本说明（<code>data-orc-prototype-annotation</code>，可随剥离脚本移除）。</p>
    </template>
    <template id="orc-help-tpl-preset" data-orc-prototype-annotation>
      <p>
        顶栏为<strong>交互样板</strong>：可点的<strong>角色芯片</strong>、<strong>「更多」</strong>下拉（每项 <strong>图标 + 标题</strong>，悬停/焦点高亮见 <code>原型设计统一.skill.md</code>），以及模型设置里的<strong>「角色管理」</strong>下拉框，在原型里为<strong>同一套可选角色</strong>（改一处应同步另一处）。
      </p>
      <p>
        <strong>「更多」</strong>：<strong>自定义角色</strong>跳转控制台 <code>account/console.html#preset</code>；<strong>打开模型设置（暂不支持）</strong>为禁用占位；<strong>添加角色</strong>打开弹窗（列表预选当前角色，点<strong>完成</strong>应用；<strong>取消</strong>、遮罩、Esc 不应用）；说明条内<strong>创建角色</strong>链至 <code>?create=1#preset</code> 并自动展开控制台「新建角色」表单。
      </p>
    </template>
    <template id="orc-help-tpl-assistant" data-orc-prototype-annotation>
      <p>正文为<strong>占位</strong>，非真实流式输出（演示）；下方工具按钮为静态禁用。</p>
      <p><strong>Compare to</strong> 打开与侧栏<strong>模型对比</strong>相同的弹窗；<strong>完成</strong> 后写入侧栏「消息内对比」集合。</p>
    </template>
    <template id="orc-help-tpl-compare" data-orc-prototype-annotation>
      <p>失败模型合并为<strong>左栏</strong>紧凑列表；成功回答占<strong>右栏</strong>主区域并可纵向滚动。多成功模型时右栏内可横向滑动。</p>
    </template>
    <template id="orc-help-tpl-summary" data-orc-prototype-annotation>
      <p><strong>综合总结</strong>当前为<strong>暂不支持</strong>：评分表、失败模型列表与综合段落均为<strong>静态示意</strong>演示占位，未接真实聚合与裁判逻辑。</p>
    </template>
    <template id="orc-help-tpl-empty" data-orc-prototype-annotation>
      <p>场景卡与首页能力入口一致：在侧栏加载<strong>模型集合</strong>，可在集合内多选参与发送后的对比布局；<strong>快捷提示词</strong>填入输入框。</p>
    </template>
    <template id="orc-help-tpl-picker" data-orc-prototype-annotation>
      <p>与侧栏共用<strong>搜索与筛选</strong>；默认不列出 <code>available: false</code> 的模型；<strong>免费</strong>为紫色强调筛选。</p>
      <p>仅<strong>取消 / 完成</strong>关闭弹层；<strong>完成</strong>应用多选（多模型时进入侧栏对比集合）。</p>
    </template>
    <template id="orc-help-tpl-settings" data-orc-prototype-annotation>
