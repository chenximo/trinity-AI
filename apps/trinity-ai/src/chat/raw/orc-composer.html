          <div class="orc-composer-wrap">

                placeholder="输入消息，Enter 发送（Shift+Enter 换行）"

                <div class="orc-bar-left">

                      aria-controls="orc-memory-popover"

                      aria-modal="true"

                      <p class="orc-memory-hint">
                        每次请求将附带本对话中最近 <strong id="orc-memory-hint-n">8</strong> 条消息（与常见 Chat memory 一致；未接 API）。
                      </p>
                    </div>
                  </div>
                  <div class="orc-net-tools-wrap">

                      class="orc-bar-btn orc-bar-btn--net-tools"

                      </svg>
                      <span class="orc-badge" id="orc-net-tools-badge" aria-hidden="true">1</span>
                    </button>
                    <div

                            <span class="orc-net-row-meta">自动 · 中</span>
                          </div>
                          <label class="orc-net-switch">
                            <input type="checkbox" id="orc-net-toggle-search" class="orc-net-switch-input" />
                            <span class="orc-net-switch-track" aria-hidden="true"><span class="orc-net-switch-knob"></span></span>
                          </label>
                          <span class="orc-net-chevron" aria-hidden="true">›</span>
                        </div>
                        <div class="orc-net-row" role="listitem">
                          <span class="orc-net-row-ico" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                            </svg>
                          </span>
                          <div class="orc-net-row-body">
                            <strong class="orc-net-row-title">网页抓取</strong>
                            <span class="orc-net-row-desc">根据 URL 拉取正文内容</span>
                            <span class="orc-net-row-meta">自动</span>

                          <label class="orc-net-switch">
                            <input type="checkbox" id="orc-net-toggle-fetch" class="orc-net-switch-input" />

                          </label>
                          <span class="orc-net-chevron" aria-hidden="true">›</span>
                        </div>
                        <div class="orc-net-row" role="listitem">

                              <path d="M21 15l-5-5L5 21" />
                            </svg>
                          </span>
                          <div class="orc-net-row-body">

                            <span class="orc-net-row-meta">自动</span>
                          </div>
                          <label class="orc-net-switch">
                            <input type="checkbox" id="orc-net-toggle-image" class="orc-net-switch-input" />
                            <span class="orc-net-switch-track" aria-hidden="true"><span class="orc-net-switch-knob"></span></span>
                          </label>
                          <span class="orc-net-chevron" aria-hidden="true">›</span>
                        </div>
                        <div class="orc-net-row orc-net-row--last" role="listitem">

                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                              <circle cx="12" cy="12" r="10" />
                              <path d="M12 6v6l4 2" />
                            </svg>
                          </span>
                          <div class="orc-net-row-body">
                            <strong class="orc-net-row-title">日期时间</strong>
                            <span class="orc-net-row-desc">向模型提供当前日期与时间</span>
                            <span class="orc-net-row-meta">自动</span>
                          </div>
                          <label class="orc-net-switch">
                            <input type="checkbox" id="orc-net-toggle-time" class="orc-net-switch-input" checked />
                            <span class="orc-net-switch-track" aria-hidden="true"><span class="orc-net-switch-knob"></span></span>
                          </label>
                          <span class="orc-net-chevron" aria-hidden="true">›</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="orc-bar-right">
                  <button type="button" class="orc-bar-btn" aria-label="语音输入">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                </div>
