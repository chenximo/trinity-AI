# trinity.tools/v1 · Monorepo 工程原子能力清单

schema: trinity.tools/v1
skill: trinity-vue-prototype-monorepo
cwd: trinity-AI

tools:
  - id: monorepo.dev.portal
    title: 启动门户 dev
    summary: apps/trinity-portal 聚合预览
    command: npm run dev
    confirm: none
    network: false
    git: false
    tags: [dev, preview]

  - id: monorepo.dev.trinity-ai
    title: 启动 Trinity AI dev
    command: npm run dev:trinity-ai
    summary: 用户站高保真
    confirm: none
    network: false
    git: false
