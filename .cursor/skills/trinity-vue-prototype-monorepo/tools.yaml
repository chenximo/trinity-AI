  - id: monorepo.deps.install
    title: 安装 workspace 依赖
    command: npm install
    confirm: required
    network: true
    git: true
    tags: [deps]

  - id: monorepo.views.edit
    title: 改 app views / 页面
    command: null
    action: edit
    paths:
      - apps/*/src/views/
      - apps/*/src/components/
    confirm: none
    network: false
    git: true
    tags: [page]

  - id: monorepo.packages.edit
    title: 改 packages/ui 或 tokens
    command: null
    action: edit
    paths:
      - packages/ui/
      - packages/tokens/
    confirm: optional
    network: false
    git: true
    tags: [packages, design]

  - id: monorepo.structure.refactor
    title: 重构 apps/packages 目录
    command: null
    action: refactor
    confirm: required
    network: false
    git: true
    tags: [structure]

  - id: monorepo.module.delete
    title: 删除模块或静态遗留
    command: null
    action: delete
    confirm: required
    network: false
    git: true
    tags: [delete]
